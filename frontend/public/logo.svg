<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Pickleball -->
  <defs>
    <radialGradient id="ballGradient" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#a3e635;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Ball with holes -->
  <circle cx="100" cy="100" r="75" fill="url(#ballGradient)" stroke="#15803d" stroke-width="3"/>

  <!-- Ball holes (perforations) -->
  <circle cx="75" cy="70" r="6" fill="white" opacity="0.8"/>
  <circle cx="125" cy="70" r="6" fill="white" opacity="0.8"/>
  <circle cx="100" cy="90" r="6" fill="white" opacity="0.8"/>
  <circle cx="70" cy="115" r="6" fill="white" opacity="0.8"/>
  <circle cx="130" cy="115" r="6" fill="white" opacity="0.8"/>
  <circle cx="100" cy="135" r="6" fill="white" opacity="0.8"/>

  <!-- Checkmark -->
  <g transform="translate(100, 100)">
    <!-- Orange arc/swoosh -->
    <path d="M -30 -20 Q 0 20 30 -10" stroke="#f97316" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Checkmark -->
    <path d="M -15 5 L 5 20 L 25 -15" stroke="white" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Shadow -->
  <ellipse cx="100" cy="170" rx="60" ry="12" fill="black" opacity="0.15"/>
</svg>
