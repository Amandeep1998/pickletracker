<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c350a"/>
      <stop offset="100%" stop-color="#2a5010"/>
    </linearGradient>
    <linearGradient id="p-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2d7005"/>
      <stop offset="100%" stop-color="#91BE4D"/>
    </linearGradient>
    <linearGradient id="t-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec9937"/>
      <stop offset="100%" stop-color="#f5b855"/>
    </linearGradient>
  </defs>
  <!-- Background with subtle gradient -->
  <rect width="32" height="32" rx="7" fill="url(#bg-grad)"/>
  <!-- "P" with green gradient -->
  <text
    x="5" y="23"
    font-family="system-ui, -apple-system, Arial, sans-serif"
    font-weight="900"
    font-size="18"
    fill="url(#p-grad)"
  >P</text>
  <!-- "T" with orange gradient -->
  <text
    x="16" y="23"
    font-family="system-ui, -apple-system, Arial, sans-serif"
    font-weight="900"
    font-size="18"
    fill="url(#t-grad)"
  >T</text>
</svg>
