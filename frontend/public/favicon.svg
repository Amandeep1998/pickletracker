<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Pickleball icon (simplified - ball only) -->
  <defs>
    <radialGradient id="ballGradient" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#a3e635;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Ball with holes -->
  <circle cx="100" cy="100" r="90" fill="url(#ballGradient)" stroke="#15803d" stroke-width="2"/>

  <!-- Ball holes (perforations) -->
  <circle cx="70" cy="70" r="7" fill="white" opacity="0.8"/>
  <circle cx="130" cy="70" r="7" fill="white" opacity="0.8"/>
  <circle cx="100" cy="95" r="7" fill="white" opacity="0.8"/>
  <circle cx="65" cy="120" r="7" fill="white" opacity="0.8"/>
  <circle cx="135" cy="120" r="7" fill="white" opacity="0.8"/>
  <circle cx="100" cy="145" r="7" fill="white" opacity="0.8"/>

  <!-- Shadow for depth -->
  <ellipse cx="100" cy="185" rx="70" ry="10" fill="black" opacity="0.12"/>
</svg>
