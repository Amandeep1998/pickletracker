name: Keep Render Server Alive

on:
  schedule:
    # Runs every 5 minutes — keeps Render free tier from sleeping
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" --max-time 35 https://api.pickletracker.in/health)
          echo "Health check response: $response"
          if [ "$response" = "200" ]; then
            echo "Server is alive"
          else
            echo "Server returned $response — may be cold starting"
          fi
